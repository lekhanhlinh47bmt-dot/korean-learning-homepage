<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bài 1</title>
    <style>
        body {
            background: linear-gradient(135deg, #1f4068, #162447);
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
        }
        /* CSS 3D Flashcard */
        .flashcard-container { perspective: 1000px; margin: 30px auto; width: 320px; height: 200px; }
        .flashcard { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; transition: transform 0.6s; cursor: pointer; }
        .flashcard.flipped { transform: rotateY(180deg); }
        .card-face { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 16px rgba(0,0,0,0.4); }
        .card-front { background: linear-gradient(135deg, #00b4d8, #0077b6); color: white; }
        .card-back { background: linear-gradient(135deg, #2a5298, #1e3c72); color: #00b4d8; transform: rotateY(180deg); border: 2px solid #00b4d8; }

        /* CSS Luyện dịch câu */
        .quiz-container { background: rgba(255, 255, 255, 0.05); max-width: 550px; margin: 40px auto; padding: 25px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .translation-input { width: 80%; padding: 12px; border-radius: 8px; border: none; margin-top: 15px; font-size: 1rem; }
        .check-btn { background-color: #00b4d8; color: white; border: none; padding: 12px 25px; border-radius: 8px; margin-top: 10px; cursor: pointer; font-size: 1rem; }
        .result-msg { margin-top: 15px; font-weight: bold; font-size: 1.1rem; }

        .back-link { color: #00b4d8; text-decoration: none; display: inline-block; margin-top: 30px; font-size: 1.1rem; }
    </style>
    </head>
<body>
    <a href="vocab.html" class="back-link">Quay lại trang Từ vựng</a>
    <h1>초급 1 - Bài 1</h1>
    <p>Bấm vào thẻ để lật xem nghĩa, sau đó gõ chữ dịch câu bên dưới nhé!</p>

    <!-- 1. PHẦN FLASHCARD TỪ VỰNG -->
    <div class="flashcard-container">
        <div class="flashcard" onclick="this.classList.toggle('flipped')">
            <div class="card-face card-front">
                <h2 style="font-size: 2.5rem; margin: 0;">안녕하세요</h2>
                <span style="font-size: 0.8rem; opacity: 0.7; margin-top: 15px;">👉 Bấm để lật mặt</span>
            </div>
            <div class="card-face card-back">
                <h2 style="font-size: 2.2rem; margin: 0; color: white;">Xin chào</h2>
                <span style="font-size: 1rem; color: #00b4d8; margin-top: 10px;">Phát âm: An-nyeong-ha-se-yo</span>
            </div>
        </div>
    </div>

    <!-- 2. PHẦN LUYỆN DỊCH CÂU HỎI -->
    <div class="quiz-container">
        <h3>✍️ Thử Tài Dịch Câu</h3>
        <p style="font-size: 1.3rem; color: #00b4d8; font-weight: bold;">"한국어 공부는 재미있어요."</p>
        <input type="text" id="user-translation" class="translation-input" placeholder="Nhập câu dịch tiếng Việt của bạn...">
        <br>
        <button class="check-btn" onclick="checkTranslation()">Kiểm tra đáp án</button>
        <div id="result" class="result-msg"></div>
    </div>

    <a href="vocab.html" class="back-link"> Quay lại kho từ vựng</a>

    <script>
        function checkTranslation() {
            var answer = document.getElementById('user-translation').value.trim();
            var resultDiv = document.getElementById('result');
            if (answer.includes("Học tiếng Hàn") && (answer.includes("thú vị") || answer.includes("vui"))) {
                resultDiv.innerHTML = "🎉 Chính xác! (Đáp án: Học tiếng Hàn rất thú vị)";
                resultDiv.style.color = "#4caf50";
            } else if (answer === "") {
                resultDiv.innerHTML = "⚠️ Bạn chưa nhập câu dịch!";
                resultDiv.style.color = "#ffeb3b";
            } else {
                resultDiv.innerHTML = "❌ Chưa chính xác, thử lại nhé! 😉";
                resultDiv.style.color = "#f44336";
            }
        }
    </script>
</body>
</html>
